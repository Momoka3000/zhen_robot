# 1. 静态地图服务器配置
map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: "warehouse_map.yaml"

# 2. AMCL 定位：专治旋转漂移
amcl:
  ros__parameters:
    use_sim_time: True
    alpha1: 0.1
    alpha2: 0.1
    alpha3: 0.99
    alpha4: 0.99
    base_frame_id: "base_footprint"
    laser_frame_id: "laser_link"
    global_frame_id: "map"
    odom_frame_id: "odom"
    min_particles: 2500
    max_particles: 4000
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    set_initial_pose: True
    scan_topic: "/scan"
    update_min_d: 0.001
    update_min_a: 0.001
    transform_tolerance: 0.2
    laser_likelihood_max_dist: 0.5

# 3. 行为树导航配置
bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: "base_footprint"
    odom_topic: /odom
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"

# 4. 局部控制器 (避障) 配置 + 局部代价地图
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # 局部代价地图：正确坐标系
    local_costmap:
      ros__parameters:
        update_frequency: 5.0
        publish_frequency: 2.0
        global_frame: odom
        robot_base_frame: base_footprint
        use_sim_time: true
        static_map: false
        rolling_window: true
        width: 3.0
        height: 3.0
        resolution: 0.05
        inflation_radius: 0.3
        plugins: ["obstacle_layer", "inflation_layer"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.5
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.5
      min_speed_theta: 0.0
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      RotateToGoal:
        plugin: "dwb_critics::RotateToGoalCriterion"
        lookahead_dist: 0.6
      Oscillation:
        plugin: "dwb_critics::OscillationCriterion"
      BaseObstacle:
        plugin: "dwb_critics::BaseObstacleCriterion"
      GoalAlign:
        plugin: "dwb_critics::GoalAlignCriterion"
        forward_point_distance: 0.1
      PathAlign:
        plugin: "dwb_critics::PathAlignCriterion"
        forward_point_distance: 0.1
      PathDist:
        plugin: "dwb_critics::PathDistCriterion"
      GoalDist:
        plugin: "dwb_critics::GoalDistCriterion"

# 5. 全局规划器配置 + 全局代价地图
planner_server:
  ros__parameters:
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"

    # 全局代价地图：正确坐标系
    global_costmap:
      ros__parameters:
        update_frequency: 1.0
        publish_frequency: 1.0
        global_frame: map
        robot_base_frame: base_footprint
        use_sim_time: true
        static_map: true
        inflation_radius: 0.3

# 6. 生命周期管理器
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: True
    autostart: true
    node_names: ['map_server', 'amcl', 'planner_server', 'controller_server', 'bt_navigator']