# 1. 静态地图服务器配置
map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: "warehouse_map.yaml"

# 2. AMCL 定位：优化旋转漂移和高速运动稳定性
amcl:
  ros__parameters:
    use_sim_time: True
    # 运动模型噪声参数（关键修复：增加旋转噪声以应对高速旋转）
    alpha1: 0.2    # 旋转运动旋转噪声 σ_rot_rot（从0.1增加到0.2）
    alpha2: 0.2    # 旋转运动平移噪声 σ_rot_trans（从0.1增加到0.2）
    alpha3: 0.8    # 平移运动旋转噪声 σ_trans_rot（从0.99降低到0.8）
    alpha4: 0.8    # 平移运动平移噪声 σ_trans_trans（从0.99降低到0.8）
    base_frame_id: "base_footprint"
    laser_frame_id: "laser_link"
    global_frame_id: "map"
    odom_frame_id: "odom"
    # 粒子数量优化：增加最小粒子数以提高高速运动时的稳定性
    min_particles: 3000   # 从2500增加到3000
    max_particles: 5000   # 从4000增加到5000
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    set_initial_pose: True
    initial_pose.x: 0.0
    initial_pose.y: 0.0
    initial_pose.z: 0.0
    initial_pose.yaw: 0.0
    # 初始位姿不确定性（关键修复：增加初始分散度）
    initial_pose.stddev.x: 0.5
    initial_pose.stddev.y: 0.5
    initial_pose.stddev.z: 0.0
    initial_pose.stddev.yaw: 0.3
    scan_topic: "/scan"
    # 更新阈值优化：适当提高以减少高频噪声
    update_min_d: 0.05    # 从0.001增加到0.05
    update_min_a: 0.05    # 从0.001增加到0.05
    # 激光模型参数优化
    laser_likelihood_max_dist: 2.0   # 从0.5增加到2.0，提高远距离特征利用
    laser_model_type: "likelihood_field"
    laser_z_hit: 0.95
    laser_z_rand: 0.05
    # 恢复策略参数
    recovery_alpha_slow: 0.001       # 慢速恢复因子
    recovery_alpha_fast: 0.1         # 快速恢复因子
    # 坐标变换容差
    transform_tolerance: 0.5         # 从0.2增加到0.5，提高容错性

# 3. 行为树导航配置
bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: "base_footprint"
    odom_topic: /odom
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"

# 4. 局部控制器 (避障) 配置 + 局部代价地图
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # 局部代价地图：正确坐标系
    local_costmap:
      ros__parameters:
        update_frequency: 5.0
        publish_frequency: 2.0
        global_frame: odom
        robot_base_frame: base_footprint
        use_sim_time: true
        static_map: false
        rolling_window: true
        width: 3.0
        height: 3.0
        resolution: 0.05
        inflation_radius: 0.3
        plugins: ["obstacle_layer", "inflation_layer"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.5
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.5
      min_speed_theta: 0.0
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      RotateToGoal:
        plugin: "dwb_critics::RotateToGoalCriterion"
        lookahead_dist: 0.6
      Oscillation:
        plugin: "dwb_critics::OscillationCriterion"
      BaseObstacle:
        plugin: "dwb_critics::BaseObstacleCriterion"
      GoalAlign:
        plugin: "dwb_critics::GoalAlignCriterion"
        forward_point_distance: 0.1
      PathAlign:
        plugin: "dwb_critics::PathAlignCriterion"
        forward_point_distance: 0.1
      PathDist:
        plugin: "dwb_critics::PathDistCriterion"
      GoalDist:
        plugin: "dwb_critics::GoalDistCriterion"

# 5. 全局规划器配置 + 全局代价地图
planner_server:
  ros__parameters:
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"

    # 全局代价地图：正确坐标系
    global_costmap:
      ros__parameters:
        update_frequency: 1.0
        publish_frequency: 1.0
        global_frame: map
        robot_base_frame: base_footprint
        use_sim_time: true
        static_map: true
        inflation_radius: 0.3

# 6. 生命周期管理器
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: True
    autostart: true
    node_names: ['map_server', 'amcl', 'planner_server', 'controller_server', 'bt_navigator']